appId: com.ocsolar.grid
productName: OC Solar Grid
copyright: Copyright © 2026 OC Solar Inc.

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - dist/ocsolar-grid-desktop/**/*
  # Playwright + bundled Chromium for the SCE submission helper.
  # Without explicit includes electron-builder strips the dev-time
  # browser binaries from the production bundle.  asarUnpack below
  # makes the Chromium executable runnable from inside the .app.
  - node_modules/playwright/**/*
  - node_modules/playwright-core/**/*
  - node_modules/pdf-lib/**/*

asarUnpack:
  # Chromium binaries can't be exec'd from inside app.asar — they
  # have to live on the real filesystem.  Unpacking the entire
  # playwright-core tree also covers the browser registry / shim
  # scripts Playwright reads at startup.
  - node_modules/playwright-core/**/*
  - node_modules/playwright/**/*

extraMetadata:
  main: dist-electron/main.js

mac:
  category: public.app-category.business
  artifactName: "OCSolarGrid-Mac-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "OCSolarGrid-Windows-Setup.${ext}"
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

publish:
  provider: github
  owner: OC-Solar-Inc
  repo: ocsolar-grid-desktop
  releaseType: release
