name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Sync package.json version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write environment files
        env:
          ENV_TS: ${{ secrets.ENVIRONMENT_TS }}
          ENV_PROD_TS: ${{ secrets.ENVIRONMENT_PROD_TS }}
        run: |
          mkdir -p src/environments
          echo "$ENV_TS" | base64 --decode > src/environments/environment.ts
          echo "$ENV_PROD_TS" | base64 --decode > src/environments/environment.prod.ts

      - name: Write SCE PowerClerk credentials
        env:
          POWERCLERK_CREDENTIALS_TS: ${{ secrets.POWERCLERK_CREDENTIALS_TS }}
        run: |
          mkdir -p electron/sce-driver
          printf '%s' "$POWERCLERK_CREDENTIALS_TS" | base64 --decode > electron/sce-driver/credentials.ts

      - name: Build Angular
        run: npm run build:prod

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Mac DMGs and Zips
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Sync package.json version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write environment files
        env:
          ENV_TS: ${{ secrets.ENVIRONMENT_TS }}
          ENV_PROD_TS: ${{ secrets.ENVIRONMENT_PROD_TS }}
        shell: bash
        run: |
          mkdir -p src/environments
          echo "$ENV_TS" | base64 --decode > src/environments/environment.ts
          echo "$ENV_PROD_TS" | base64 --decode > src/environments/environment.prod.ts

      - name: Write SCE PowerClerk credentials
        env:
          POWERCLERK_CREDENTIALS_TS: ${{ secrets.POWERCLERK_CREDENTIALS_TS }}
        shell: bash
        run: |
          mkdir -p electron/sce-driver
          printf '%s' "$POWERCLERK_CREDENTIALS_TS" | base64 --decode > electron/sce-driver/credentials.ts

      - name: Build Angular
        run: npm run build:prod

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
